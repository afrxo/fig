version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: fig
    main: ./cmd
    binary: fig
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/afrxo/fig/internal.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: fea
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: 'checksums.txt'

release:
  github:
    owner: afrxo
    name: fig
  draft: false
  prerelease: auto
  mode: replace

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
